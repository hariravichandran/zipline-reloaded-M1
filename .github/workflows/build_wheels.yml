name: Build & Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: 'Package Index'
        required: true
        default: 'TESTPYPI'
        options: [ 'TESTPYPI', 'PYPI' ]
  release:
    types: [published]

jobs:
  build_wheels:
    name: Wheels for ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 = Apple Silicon (M1), ubuntu-latest = x86_64, windows-latest = x64
        os: [ ubuntu-latest, windows-latest, macos-14 ]
        python: [ "cp310", "cp311", "cp312", "cp313" ]
        arch: [ auto64 ]

    steps:
      - name: Checkout zipline
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        if: ${{ startsWith(matrix.os, 'macos') }}
        with:
          xcode-version: latest-stable

      - name: Wheels macOS / Linux
        if: runner.os != 'Windows'
        uses: pypa/cibuildwheel@v3.3.0
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          # Build ARM64 first (primary target), then x86_64
          CIBW_ARCHS_MACOS: arm64 x86_64
          CIBW_BUILD: "${{ matrix.python }}-*"
          CIBW_SKIP: "*-musllinux_*"
          # macOS 11.0 is minimum for arm64 (Apple Silicon) support
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=11.0

      - name: Install MSVC amd64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Wheels Windows
        if: runner.os == 'Windows'
        uses: pypa/cibuildwheel@v3.3.0
        env:
          CIBW_BUILD: "${{ matrix.python }}-win_amd64"

      - name: Store artifacts
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          pip install -U pip setuptools build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: wheels-sdist
          path: ./dist/*.tar.gz

  upload_pypi:
    needs: [ build_wheels, build_sdist ]
    runs-on: ubuntu-latest
    # Only publish on release events or manual workflow dispatch
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Publish to PyPI
        if: >-
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'PYPI')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Publish to TestPyPI
        if: >-
          github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'TESTPYPI'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true
          packages-dir: dist/
